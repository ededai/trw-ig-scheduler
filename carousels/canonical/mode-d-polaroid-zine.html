<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&family=Space+Grotesk:wght@500;700&family=Caveat:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
:root {
  --paper:#e8e0d2;
  --paper-2:#d8cfbe;
  --ink:#171410;
  --ink-soft:#3a342a;
  --orange:#EF5927;
  --tape:#f8e896;
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1080px; height:1350px; margin:0; padding:0; background:var(--paper); font-family:'Inter',system-ui,sans-serif; color:var(--ink); overflow:hidden; }

.slide {
  width:1080px; height:1350px; position:relative; overflow:hidden;
  background:
    radial-gradient(circle at 8% 8%, rgba(0,0,0,0.04), transparent 35%),
    radial-gradient(circle at 92% 88%, rgba(0,0,0,0.06), transparent 40%),
    linear-gradient(170deg, var(--paper), var(--paper-2));
}
.grain {
  position:absolute; inset:0;
  background-image:
    radial-gradient(rgba(0,0,0,0.06) 1px, transparent 1px),
    radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 4px 4px, 7px 7px;
  background-position: 0 0, 2px 2px;
  opacity:0.6; mix-blend-mode:multiply;
  pointer-events:none;
}
/* coffee stain accent */
.stain {
  position:absolute; top:1100px; left:60px; width:160px; height:120px;
  background: radial-gradient(ellipse at center, rgba(74,45,15,0.18), rgba(74,45,15,0.08) 50%, transparent 75%);
  border-radius:50%;
  transform:rotate(-12deg);
  filter:blur(2px);
}

/* TOP CHROME */
.top-row {
  position:absolute; top:48px; left:56px; right:56px;
  display:flex; justify-content:space-between; align-items:center; z-index:5;
}
.brand img {
  display:block; height:48px; width:auto;
  filter: invert(0.9) brightness(0.18) saturate(0);
}
.series-meta {
  font-family:'Special Elite',monospace; font-weight:400;
  font-size:18px; letter-spacing:0.18em; text-transform:uppercase;
  color:var(--ink);
}

/* POLAROID PHOTO — tilted */
.polaroid {
  position:absolute; top:160px; left:130px;
  width:660px; height:660px;
  background:#fafaf6;
  padding:24px 24px 90px;
  border:1px solid rgba(0,0,0,0.08);
  box-shadow:
    0 4px 0 rgba(0,0,0,0.05),
    0 22px 48px -18px rgba(0,0,0,0.45);
  transform: rotate(-3deg);
  z-index:3;
}
.polaroid .photo-img {
  width:100%; height:546px;
  background-image:url('vezel-d.png');
  background-size:cover; background-position:center;
  background-color:#222;
}
.polaroid .photo-cap {
  margin-top:16px;
  text-align:center;
  font-family:'Caveat',cursive; font-weight:700;
  font-size:30px; color:#3a342a;
}
/* yellow tape over polaroid corner */
.tape {
  position:absolute; top:8px; left:50%; transform:translateX(-50%) rotate(-2deg);
  width:140px; height:30px;
  background:var(--tape);
  opacity:0.78;
  box-shadow: 0 1px 2px rgba(0,0,0,0.18);
  z-index:1;
}

/* HANDWRITTEN STICKY NOTE */
.sticky {
  position:absolute; top:520px; right:80px;
  width:280px; min-height:200px;
  background:#fffae3;
  padding:24px 20px;
  transform:rotate(4deg);
  box-shadow: 0 12px 30px -12px rgba(0,0,0,0.35);
  font-family:'Caveat',cursive;
  font-weight:700; font-size:30px; line-height:1.2;
  color:#3a342a;
  z-index:4;
}
.sticky .arrow {
  position:absolute; bottom:-18px; left:30px;
  font-family:'Caveat',cursive; font-weight:700;
  font-size:42px; color:var(--orange);
  transform: rotate(40deg);
}

/* HEADLINE BLOCK BELOW POLAROID */
.headline-block {
  position:absolute; left:56px; right:56px; top:880px;
  z-index:5;
}
.kicker {
  display:flex; align-items:center; gap:12px; margin-bottom:18px;
}
.kicker .stamp {
  font-family:'Special Elite',monospace; font-weight:400;
  font-size:14px; letter-spacing:0.22em; text-transform:uppercase;
  color:#fff; background:var(--orange);
  padding:4px 10px;
  transform:rotate(-1.5deg);
}
.kicker .date {
  font-family:'Caveat',cursive; font-weight:700;
  font-size:28px; color:var(--ink-soft);
}
h1 {
  font-family:'Caveat',cursive; font-weight:700;
  font-size:106px; line-height:0.98; letter-spacing:-0.005em;
  color:var(--ink); margin-bottom:14px;
}
h1 .underline {
  display:inline-block; position:relative;
  color:var(--orange);
}
h1 .underline::after {
  content:''; position:absolute;
  left:-4px; right:-4px; bottom:8px; height:14px;
  background:rgba(239,89,39,0.22);
  z-index:-1;
  transform:rotate(-0.6deg);
}
.lead {
  font-family:'Special Elite',monospace; font-weight:400;
  font-size:22px; line-height:1.5; color:var(--ink);
  max-width:88%; margin-bottom:30px;
}

/* corner stamp + scribble swipe sit over cream, no separate footer band */
.corner-stamp {
  position:absolute; bottom:50px; left:56px;
  font-family:'Special Elite',monospace; font-weight:400;
  font-size:13px; letter-spacing:0.22em; text-transform:uppercase;
  color:var(--ink); z-index:5;
  border:1.5px solid var(--ink); padding:8px 12px;
  transform:rotate(-1deg);
}
.scribble-swipe {
  position:absolute; bottom:48px; right:56px;
  font-family:'Caveat',cursive; font-weight:700;
  font-size:38px; color:var(--orange);
  display:inline-flex; align-items:center; gap:10px;
  z-index:5;
  transform:rotate(-2deg);
}
.scribble-swipe .arr { font-size:48px; }
/* FOOTER — transparent, sits over cream paper */
.footer-bar {
  position:absolute; left:56px; right:56px; bottom:36px; z-index:5;
  display:flex; align-items:center; justify-content:space-between;
}
.footer-bar .meta {
  font-family:'Special Elite',monospace; font-weight:400;
  font-size:14px; letter-spacing:0.24em; text-transform:uppercase;
  color:var(--ink-soft);
}
.footer-bar .meta strong { color:var(--orange); }
.footer-bar .stamp {
  font-family:'Caveat',cursive; font-weight:700;
  font-size:30px; color:var(--ink);
  transform:rotate(-2deg);
}
.footer-bar .stamp .arr { color:var(--orange); font-size:38px; }
</style></head>
<body>
  <div class="slide">
    <div class="grain"></div>
    <div class="stain"></div>

    <div class="top-row">
      <div class="brand"><img src="trw-logo-white.png"></div>
      <div class="series-meta">Behind The Badge</div>
    </div>

    <div class="polaroid">
      <div class="tape"></div>
      <div class="photo-img"></div>
      <div class="photo-cap">My Vezel · 8 yrs · 142,000 km</div>
    </div>

    <div class="sticky">
      4 things I wish<br>I knew before<br>I bought it.
      <div class="arrow">↓</div>
    </div>

    <div class="headline-block">
      <div class="kicker">
        <span class="stamp">Owner Diary</span>
        <span class="date">Since 2018</span>
      </div>
      <h1>Living with my <span class="underline">Vezel</span>.</h1>
      <p class="lead">Eight years. Two cooling coils. One software update.<br>What every Vezel owner figures out, usually too late.</p>
    </div>

    <div class="corner-stamp">The Right Workshop · KB SG</div>
    <div class="scribble-swipe">read it <span class="arr">→</span></div>
  </div>
</body></html>
