name: TRW Blog Daily Refresh

on:
  schedule:
    # 16:30 UTC = 00:30 SGT daily.
    # 5-day featured rotation + og:image drift fix + schema.org image fix.
    - cron: "30 16 * * *"
  workflow_dispatch: {}
  # Auto-fire on any change to the blog cron itself, so we self-verify on each
  # workflow/script edit instead of waiting for the next scheduled tick.
  push:
    branches: [main]
    paths:
      - "blog/**"
      - ".github/workflows/blog-cron.yml"

permissions:
  contents: write

concurrency:
  group: blog-refresh
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests beautifulsoup4

      - name: Run blog refresh
        env:
          WORDPRESS_API_URL:  ${{ secrets.WORDPRESS_API_URL }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_PASSWORD: ${{ secrets.WORDPRESS_PASSWORD }}
        run: |
          echo "=== secret presence check (values masked) ==="
          echo "WORDPRESS_API_URL set:  ${WORDPRESS_API_URL:+YES}${WORDPRESS_API_URL:-NO}"
          echo "WORDPRESS_USERNAME set: ${WORDPRESS_USERNAME:+YES}${WORDPRESS_USERNAME:-NO}"
          echo "WORDPRESS_PASSWORD set: ${WORDPRESS_PASSWORD:+YES (len=${#WORDPRESS_PASSWORD})}${WORDPRESS_PASSWORD:-NO}"
          echo "=== running blog refresh ==="
          bash blog/daily_blog_refresh.sh

      - name: Always upload log on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blog-cron-log
          path: blog/logs/cron_blog.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Commit log changes
        if: always()
        run: |
          if [[ -n "$(git status --porcelain blog/logs/ 2>/dev/null)" ]]; then
            git config user.name  "trw-ig-scheduler-bot"
            git config user.email "actions@users.noreply.github.com"
            git add blog/logs/
            git commit -m "chore: blog refresh log [$(date -u +%FT%TZ)]"
            git push
          else
            echo "No log changes to commit."
          fi
