name: TRW Bi-weekly Content Sync Audit

on:
  schedule:
    # 18:30 UTC on the last day of month / 14th = 02:30 SGT on 1st / 15th
    # GitHub Actions cron uses UTC. Singapore = UTC+8.
    # 02:30 SGT 1st  = 18:30 UTC of last day of previous month
    # 02:30 SGT 15th = 18:30 UTC of 14th
    # Approximation (always fires 18:30 UTC on 1st + 15th — runs at 02:30 SGT
    # on 1st + 15th respectively, matching the local launchd schedule):
    - cron: "30 18 1,15 * *"
  workflow_dispatch: {}
  # Auto-fire on any change to the workflow itself or the audit script,
  # so we self-verify on every edit instead of waiting for the next tick.
  push:
    branches: [main]
    paths:
      - "blog/biweekly_content_sync_check.py"
      - ".github/workflows/biweekly-content-sync.yml"

permissions:
  contents: read

concurrency:
  group: biweekly-content-sync
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run content sync audit
        env:
          WORDPRESS_API_URL:  ${{ secrets.WORDPRESS_API_URL }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_PASSWORD: ${{ secrets.WORDPRESS_PASSWORD }}
          TG_BOT_TOKEN:       ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:         ${{ secrets.TG_CHAT_ID }}
        run: |
          echo "=== secret presence check (values masked) ==="
          echo "WORDPRESS_API_URL:  ${WORDPRESS_API_URL:+YES}${WORDPRESS_API_URL:-NO}"
          echo "WORDPRESS_USERNAME: ${WORDPRESS_USERNAME:+YES}${WORDPRESS_USERNAME:-NO}"
          echo "WORDPRESS_PASSWORD: ${WORDPRESS_PASSWORD:+YES (len=${#WORDPRESS_PASSWORD})}${WORDPRESS_PASSWORD:-NO}"
          echo "TG_BOT_TOKEN:       ${TG_BOT_TOKEN:+YES}${TG_BOT_TOKEN:-NO}"
          echo "TG_CHAT_ID:         ${TG_CHAT_ID:+YES}${TG_CHAT_ID:-NO}"
          echo ""
          echo "=== running audit ==="
          python3 blog/biweekly_content_sync_check.py
