name: TRW IGS Blog Watcher

on:
  schedule:
    # Every hour. Polls WP REST for new blog posts and queues 3 IGS variants
    # (A/B/C across 3 days) per new post.
    - cron: "10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: igs-blog-watcher
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-v1

      - name: Install deps
        run: |
          pip install playwright==1.58.0
          python -m playwright install --with-deps chromium

      - name: Run blog watcher
        run: python igs_blog_watcher.py

      - name: Commit queue + assets
        run: |
          if [[ -n "$(git status --porcelain assets/ blog/igs_seen.json ig_queue.json 2>/dev/null)" ]]; then
            git config user.name  "trw-ig-scheduler-bot"
            git config user.email "actions@users.noreply.github.com"
            git add assets/ blog/igs_seen.json ig_queue.json 2>/dev/null || true
            git commit -m "igs: queue new blog post stories [$(date -u +%FT%TZ)]"
            git push
          else
            echo "No new posts detected."
          fi
