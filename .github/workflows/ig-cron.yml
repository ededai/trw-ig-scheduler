name: TRW Instagram Queue Runner

on:
  schedule:
    # Every 10 min during 8am-11pm SGT (00:00-15:00 UTC = 08:00-23:00 SGT).
    # Outside posting hours: every 30 min (cheaper, just keeps state fresh).
    # Why */10: posts now fire within ~10 min of slot time, not 30. Tightened
    # 2026-04-27 after Ed flagged unacceptable cron lag.
    # Cost: ~144 runs/day inside hours + 16 outside = ~4800 min/month, well
    # within free tier (2,000 min/month for jobs lasting <30s avg = no concern).
    - cron: "*/10 0-15 * * *"
    - cron: "*/30 16-23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: ig-queue
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      - name: Run queue
        env:
          IG_USER_ID:      ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IMGBB_API_KEY:   ${{ secrets.IMGBB_API_KEY }}
          TG_BOT_TOKEN:    ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:      ${{ secrets.TG_CHAT_ID }}
          GH_REPO_OWNER:   ${{ github.repository_owner }}
          GH_REPO_NAME:    ${{ github.event.repository.name }}
          GH_REPO_REF:     main
        run: python ig_queue.py run

      - name: Commit queue state changes
        run: |
          if [[ -n "$(git status --porcelain ig_queue.json ig_post_log.md logs/ 2>/dev/null)" ]]; then
            git config user.name  "trw-ig-scheduler-bot"
            git config user.email "actions@users.noreply.github.com"
            git add ig_queue.json ig_post_log.md logs/ 2>/dev/null || true
            git commit -m "chore: queue state update [$(date -u +%FT%TZ)]"
            git push
          else
            echo "No queue state changes."
          fi
