name: TRW Instagram Queue Runner (BACKUP)

# Defense-in-depth: GH Actions cron is best-effort and can drop ticks for
# 30 min to 3+ hours during peak load (observed 2026-04-27: 2h 15min gap
# dropped igs-10-signs-trustworthy-mechanic-singapore-a-d1). This workflow
# fires at offset minutes (5,15,25,35,45,55) so if the primary schedule
# (0,10,20,30,40,50) is dropped, this one catches it.

on:
  schedule:
    # Posting hours (08:00-23:00 SGT = 00:00-15:00 UTC), offset by 5 min
    - cron: "5-55/10 0-15 * * *"
    # Outside posting hours, offset
    - cron: "15,45 16-23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

# Same concurrency group as the primary — prevents both runners from
# racing on the queue file simultaneously.
concurrency:
  group: ig-queue
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      - name: Run queue
        env:
          IG_USER_ID:      ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IMGBB_API_KEY:   ${{ secrets.IMGBB_API_KEY }}
          TG_BOT_TOKEN:    ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:      ${{ secrets.TG_CHAT_ID }}
          GH_REPO_OWNER:   ${{ github.repository_owner }}
          GH_REPO_NAME:    ${{ github.event.repository.name }}
          GH_REPO_REF:     main
        run: python ig_queue.py run

      - name: Commit queue state changes
        run: |
          if [[ -n "$(git status --porcelain ig_queue.json ig_post_log.md logs/ 2>/dev/null)" ]]; then
            git config user.name  "trw-ig-scheduler-bot"
            git config user.email "actions@users.noreply.github.com"
            git add ig_queue.json ig_post_log.md logs/ 2>/dev/null || true
            git commit -m "chore: queue state update (backup) [$(date -u +%FT%TZ)]"
            # Retry push up to 3 times — primary cron may push concurrently
            for i in 1 2 3; do
              git pull --rebase && git push && break
              sleep 2
            done
          else
            echo "No queue state changes."
          fi
